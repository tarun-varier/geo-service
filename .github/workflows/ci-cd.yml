name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Download dependencies
        run: go mod download
      
      - name: Run tests
        run: go test -v ./...
      
      - name: Build application
        run: go build -o gps-service
      
      - name: Verify build
        run: ls -la gps-service

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-minikube:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Minikube
        uses: azure/setup-minikube@v1
        with:
          minikube version: 'v1.32.0'
          driver: docker
      
      - name: Update image in deployment
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          minikube image load ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest || true
      
      - name: Deploy to Minikube
        run: |
          kubectl apply -f kubernetes/
          kubectl rollout status deployment/gps-service --timeout=120s
      
      - name: Verify deployment
        run: |
          kubectl get pods
          kubectl get services
          kubectl get endpoints
      
      - name: Test endpoint
        run: |
          kubectl port-forward svc/gps-service 8080:8080 &
          sleep 5
          curl -s http://localhost:8080/api/v1/location
